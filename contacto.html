<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contacto | MONTESANO | Ingeniería Hídrica</title>
  <meta name="description" content="Contacto MONTESANO | Ingeniería Hídrica. Escríbenos para consultas y cotizaciones." />
  <link rel="canonical" href="https://montesano.cl/contacto.html" />
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>

<div id="header-placeholder"></div>

<main>

  <section class="page-hero container">
    <span class="eyebrow">Hablemos</span>
    <h1>Contacto</h1>
    <p class="sub">Cuéntanos tu proyecto. Con esa información podemos orientarte y proponer los próximos pasos.</p>
  </section>

  <section class="content-section">
    <div class="container" style="display:flex; justify-content:center;">
      <div style="max-width:480px; width:100%;">

        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
          <input type="hidden" name="access_key" value="0a0a3f5d-297b-407d-a09e-93e3d1e44d3c" />
          <input type="hidden" name="subject" value="Nueva consulta desde montesano.cl" />
          <input type="hidden" name="redirect" value="https://montesano.cl/gracias" />

          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="name" required placeholder="Tu nombre" />
          </div>

          <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="email" required placeholder="tu@correo.cl" />
          </div>

          <div class="form-group">
            <label for="mensaje">Cuéntanos tu proyecto</label>
            <textarea id="mensaje" name="message" required rows="5" placeholder="Qué necesitas, ubicación aproximada, antecedentes disponibles..."></textarea>
          </div>

          <button type="submit" class="btn primary">Enviar consulta</button>
          <p class="form-note">Tu información se usa exclusivamente para responder tu consulta y no se comparte con terceros.</p>
        </form>

        <p class="contact-alt">También puedes escribirnos directamente a <a href="mailto:contacto@montesano.cl">contacto@montesano.cl</a></p>

      </div>
    </div>
  </section>

</main>

<div id="footer-placeholder"></div>
<script src="assets/js/main.js"></script>
</body>
</html>
